services:
  # Backend Service
  - type: web
    name: quizsink-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: starter # Persistent disks require Starter plan or higher
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5200"
      - key: DATABASE_PATH
        value: /app/data/database.db
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: quizsink-data
      mountPath: /app/data
      sizeGB: 1

  # Frontend Service
  - type: web
    name: quizsink-frontend
    runtime: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: quizsink-backend
          type: web
          property: host
